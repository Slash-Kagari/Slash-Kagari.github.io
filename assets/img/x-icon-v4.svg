<!--
  /Kagari — X(Twitter)アイコン V4版（暗め / 紋章+炎）
  サイズ: 400×400px
  コンセプト:
    - 家紋のような円形エンブレム
    - 中央に「篝籠(かがご)」の格子と立ち上る炎のシルエット
    - それを朱の「/」が斜めに断ち切る (=ブランドの核)
    - 二重の円輪で紋章感を出す
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#1B2540"/>
      <stop offset="55%" stop-color="#0A0D14"/>
      <stop offset="100%" stop-color="#04060B"/>
    </radialGradient>

    <!-- 炎: 琥珀→朱→深紅 -->
    <linearGradient id="flame4" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"   stop-color="#8E2A10"/>
      <stop offset="40%"  stop-color="#D14A22"/>
      <stop offset="75%"  stop-color="#F4C77A"/>
      <stop offset="100%" stop-color="#FFF0C8"/>
    </linearGradient>

    <!-- 炎の内側光 -->
    <radialGradient id="flameCore4" cx="50%" cy="70%" r="50%">
      <stop offset="0%"  stop-color="#FFF0C8"/>
      <stop offset="60%" stop-color="#F4C77A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D14A22" stop-opacity="0"/>
    </radialGradient>

    <!-- スラッシュ用グラデ -->
    <linearGradient id="slash4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFF0C8"/>
      <stop offset="40%"  stop-color="#F4C77A"/>
      <stop offset="75%"  stop-color="#D14A22"/>
      <stop offset="100%" stop-color="#8E2A10"/>
    </linearGradient>

    <!-- 発光ブラー -->
    <filter id="glow4" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- 全体のマスク: 円形紋章の外側だけ影を落とす -->
    <clipPath id="disc4"><circle cx="200" cy="200" r="180"/></clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bg4)"/>

  <!-- 放射状の淡い光線(脇役) -->
  <g opacity="0.18" clip-path="url(#disc4)">
    <g stroke="#D14A22" stroke-width="1.2">
      <line x1="200" y1="200" x2="200" y2="0"/>
      <line x1="200" y1="200" x2="340" y2="60"/>
      <line x1="200" y1="200" x2="400" y2="200"/>
      <line x1="200" y1="200" x2="340" y2="340"/>
      <line x1="200" y1="200" x2="200" y2="400"/>
      <line x1="200" y1="200" x2="60"  y2="340"/>
      <line x1="200" y1="200" x2="0"   y2="200"/>
      <line x1="200" y1="200" x2="60"  y2="60"/>
    </g>
  </g>

  <!-- 外側の紋章円 -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#2A3445" stroke-width="2"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#3D6B9A" stroke-width="0.8" opacity="0.6"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#2A3445" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>

  <!-- 炎の発光ベース -->
  <ellipse cx="200" cy="200" rx="120" ry="140" fill="url(#flameCore4)" opacity="0.55"/>

  <!-- 炎のシルエット(紋のように様式化) -->
  <g clip-path="url(#disc4)">
    <!-- 外側の大きな炎 -->
    <path d="
      M 200 70
      C 230 110, 260 130, 265 170
      C 270 210, 255 235, 248 255
      C 265 245, 285 225, 290 200
      C 295 250, 278 290, 240 315
      C 260 305, 280 288, 290 270
      C 288 305, 268 335, 232 345
      C 260 345, 290 332, 308 310
      C 292 355, 250 378, 200 378
      C 150 378, 108 355, 92 310
      C 110 332, 140 345, 168 345
      C 132 335, 112 305, 110 270
      C 120 288, 140 305, 160 315
      C 122 290, 105 250, 110 200
      C 115 225, 135 245, 152 255
      C 145 235, 130 210, 135 170
      C 140 130, 170 110, 200 70 Z"
      fill="url(#flame4)" opacity="0.95"/>

    <!-- 内側の白い芯 -->
    <path d="
      M 200 140
      C 215 165, 228 180, 228 205
      C 228 230, 215 245, 200 260
      C 185 245, 172 230, 172 205
      C 172 180, 185 165, 200 140 Z"
      fill="#FFF0C8" opacity="0.9" filter="url(#glow4)"/>

    <!-- 篝籠(格子) — 底側の台座 -->
    <g stroke="#3D4A60" stroke-width="2.5" fill="none" opacity="0.85">
      <!-- 横の帯 -->
      <line x1="115" y1="320" x2="285" y2="320"/>
      <line x1="108" y1="335" x2="292" y2="335"/>
      <line x1="100" y1="350" x2="300" y2="350"/>
      <!-- 斜め格子 -->
      <line x1="120" y1="310" x2="180" y2="360"/>
      <line x1="150" y1="310" x2="210" y2="360"/>
      <line x1="180" y1="310" x2="240" y2="360"/>
      <line x1="210" y1="310" x2="270" y2="360"/>
      <line x1="280" y1="310" x2="220" y2="360"/>
      <line x1="250" y1="310" x2="190" y2="360"/>
      <line x1="220" y1="310" x2="160" y2="360"/>
      <line x1="190" y1="310" x2="130" y2="360"/>
    </g>
    <!-- 台座の地 -->
    <rect x="100" y="350" width="200" height="4" fill="#3D4A60" opacity="0.9"/>
  </g>

  <!-- 「/」の斬り線(発光) — 紋章を斜めに断ち切る主役 -->
  <g transform="rotate(-22 200 200)">
    <!-- 外側グロー -->
    <rect x="40" y="186" width="320" height="28" fill="url(#slash4)" opacity="0.35" filter="url(#glow4)"/>
    <!-- 本体 -->
    <rect x="60" y="193" width="280" height="14" fill="url(#slash4)" rx="2"/>
    <!-- 芯の白光 -->
    <rect x="70" y="198" width="260" height="4" fill="#FFF0C8" opacity="0.9"/>
    <!-- 切っ先のシャープネス: 両端を鋭く見せる台形クリップは不要、elongated rectで十分 -->
  </g>

  <!-- 火花(パーティクル) -->
  <g fill="#F4C77A">
    <circle cx="110" cy="120" r="3"   opacity="0.9"/>
    <circle cx="135" cy="90"  r="1.8" opacity="0.8"/>
    <circle cx="290" cy="105" r="2.4" opacity="0.85"/>
    <circle cx="310" cy="145" r="1.6" opacity="0.75"/>
    <circle cx="85"  cy="180" r="2"   opacity="0.8"/>
    <circle cx="320" cy="220" r="1.8" opacity="0.8"/>
    <circle cx="95"  cy="260" r="2.2" opacity="0.8"/>
    <circle cx="305" cy="290" r="1.6" opacity="0.7"/>
  </g>

  <!-- 角のクロスマーク -->
  <g stroke="#D14A22" stroke-width="1.6" opacity="0.9">
    <line x1="22"  y1="40"  x2="40"  y2="40"/><line x1="40"  y1="22"  x2="40"  y2="40"/>
    <line x1="378" y1="40"  x2="360" y2="40"/><line x1="360" y1="22"  x2="360" y2="40"/>
    <line x1="22"  y1="360" x2="40"  y2="360"/><line x1="40"  y1="378" x2="40"  y2="360"/>
    <line x1="378" y1="360" x2="360" y2="360"/><line x1="360" y1="378" x2="360" y2="360"/>
  </g>
</svg>
